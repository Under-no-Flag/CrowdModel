[simulation]
nx = 128
ny = 96
dx = 0.5
steps = 4000
time_horizon = 240.0
vmax = 1.5
rho_max = 5.0
rho_init = 2.2
bellman_every = 1
bellman_f_eps = 0.08
cfl = 0.9
dt_cap = 0.18
save_every = 40
density_contour_levels = 0

[objective]
name = "g2_multistage_directional_baseline"
lambda_j1 = 1.0
lambda_j2 = 1.0
lambda_j5 = 1.0
rho_safe = 3.5
j2_metric = "soft"
j2_gamma = 1.0
use_normalized_terms = true
j1_scale = 1.0
j2_scale = 0.001
j5_scale = 1.0

[scene]
file = "scene.toml"

[population]
file = "population.toml"

[routes]
file = "routes_baseline.toml"

[outputs]
output_root = "../../../results/g2_multistage_directional"

